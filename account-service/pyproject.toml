[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_return_any = false
disallow_untyped_defs = false

[tool.flake8]
max-line-length = 88
extend-ignore = "E203,W503"
exclude = "migrations"
